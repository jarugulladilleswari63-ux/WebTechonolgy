      <h2>Open Console (F12) to Play the Game 🎮</h2>

<script>

let n = 8;   // secret number

while (true) {

    let a = Number(prompt("Enter a number"));

    if (a === n) {
        console.log("🎉 Your guessing is correct!");
        alert("You Won!");
        break;
    }
    else if (a < n) {
        console.log("Your number is smaller than my number");
        alert("Try Bigger Number");
    }
    else if (a > n) {
        console.log("Your number is greater than my number");
        alert("Try Smaller Number");
    }
}

</script>
