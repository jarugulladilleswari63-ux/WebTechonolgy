<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        main{
            height: 600px;
            width: 400px;
            /* background-color: bisque; */
            margin: 50px auto;
            border-radius: 40px ;
            border: 2px solid red;
        }
        #image{
            height: 200px;
            width: 100%;
            background-color: blue;
            border-radius: 40px 40px 0 0 ;
        }
        #content{
            margin: 0 40px 0 40px;
        }
        h2{
            text-align: center;
            font-size: 35px;
            margin: 20px auto;
        }
        p{
            text-align: center;
            line-height: 20px;
        }
    </style>
</head>
<body>
    <main>
        <div id="image"></div>
        <div id="content">
            <h2>Order Summary</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Temporibus impedit facere repudiandae porro nobis animi voluptas iure molestias ut fuga, totam eos? Dolore molestias </p>
        </div>
    </main>
</body>
</html>
